<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Lateral Transshipment | Optimizer Platform</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #0b0714;
            --panel-bg: #18112b;
            --lavender: #a28dec;
            --lavender-dark: #3a2a6b;
            --teal: #00f0ff;
            --neon-green: #00fa9a;
            --electric-blue: #0078ff;
            --text-main: #f0f0f0;
            --danger: #ff3366;
            --warning: #ffaa00;
        }

        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-deep); }
        ::-webkit-scrollbar-thumb { background: var(--lavender-dark); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--lavender); }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-deep);
            color: var(--text-main);
            font-family: 'Rajdhani', sans-serif;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        nav {
            background: linear-gradient(90deg, var(--panel-bg) 0%, var(--lavender-dark) 100%);
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--teal);
            box-shadow: 0 4px 15px rgba(0, 240, 255, 0.1);
            flex-shrink: 0;
        }

        nav h1 {
            margin: 0;
            font-size: 1.5rem;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        nav span {
            font-family: 'JetBrains Mono', monospace;
            color: var(--teal);
            font-size: 0.9rem;
        }

        .container {
            display: grid;
            grid-template-columns: 1.4fr 1fr;
            gap: 20px;
            padding: 20px 40px;
            max-width: 1800px;
            margin: 0 auto;
            flex-grow: 1;
            overflow: hidden;
        }

        .panel {
            background-color: var(--panel-bg);
            border: 1px solid var(--lavender-dark);
            border-radius: 8px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            position: relative;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .panel::before {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 3px;
            background: var(--electric-blue);
        }

        .panel-title {
            font-size: 1.4rem;
            color: var(--lavender);
            margin-top: 0;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            border-bottom: 1px solid rgba(162, 141, 236, 0.2);
            padding-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* Controls & Filters */
        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .filter-btn {
            background: transparent;
            border: 1px solid var(--lavender-dark);
            color: var(--text-main);
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
            transition: all 0.2s;
        }

        .filter-btn:hover, .filter-btn.active {
            background: var(--lavender-dark);
            border-color: var(--lavender);
        }

        .sim-btn {
            background: transparent;
            border: 1px solid var(--teal);
            color: var(--teal);
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
            margin-left: auto;
            transition: all 0.2s;
        }

        .sim-btn:hover {
            background: rgba(0, 240, 255, 0.1);
            box-shadow: 0 0 10px rgba(0, 240, 255, 0.2);
        }

        /* Table */
        .table-wrapper {
            flex-grow: 1;
            overflow-y: auto;
            border: 1px solid var(--lavender-dark);
            border-radius: 4px;
            background: rgba(0,0,0,0.3);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
            text-align: left;
        }

        th {
            position: sticky;
            top: 0;
            background-color: var(--lavender-dark);
            color: var(--text-main);
            padding: 12px;
            border-bottom: 2px solid var(--teal);
            z-index: 10;
        }

        td {
            padding: 12px;
            border-bottom: 1px solid rgba(162, 141, 236, 0.2);
            transition: background 0.2s;
        }

        tr:hover {
            background-color: rgba(0, 120, 255, 0.15);
            cursor: pointer;
        }

        .critical-stagnant { color: var(--danger); font-weight: bold; }
        .critical-stockout { color: var(--warning); font-weight: bold; }
        .surplus-good { color: var(--neon-green); }

        /* Right Column */
        .right-column {
            display: flex;
            flex-direction: column;
            gap: 20px;
            overflow: hidden;
        }

        .asset-card {
            background: rgba(0,0,0,0.4);
            border: 1px dashed var(--lavender-dark);
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 15px;
            font-family: 'JetBrains Mono', monospace;
        }

        .action-btn {
            width: 100%;
            background: linear-gradient(45deg, var(--electric-blue), var(--lavender-dark));
            color: white;
            border: none;
            padding: 15px;
            font-family: 'Rajdhani', sans-serif;
            font-size: 1.2rem;
            font-weight: 700;
            letter-spacing: 2px;
            border-radius: 4px;
            cursor: pointer;
            text-transform: uppercase;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .action-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 120, 255, 0.4);
            background: linear-gradient(45deg, var(--teal), var(--electric-blue));
        }

        .action-btn:disabled {
            background: var(--lavender-dark);
            color: rgba(255,255,255,0.3);
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        /* Console */
        .console {
            background-color: rgba(0,0,0,0.6);
            border: 1px solid var(--lavender-dark);
            border-radius: 4px;
            padding: 15px;
            font-family: 'JetBrains Mono', monospace;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            gap: 10px;
            overflow-y: auto;
            font-size: 0.9rem;
        }

        .route-evaluation {
            border-left: 2px solid var(--lavender-dark);
            padding-left: 10px;
            margin-bottom: 5px;
            color: #aaa;
        }
        
        .route-winner {
            border-left: 2px solid var(--neon-green);
            padding-left: 10px;
            margin-top: 10px;
            background: rgba(0, 250, 154, 0.05);
            padding: 10px;
            border-radius: 0 4px 4px 0;
        }
    </style>
</head>
<body>

    <nav>
        <h1>D.L.T. Rebalancing Engine</h1>
        <span id="sysClock">STATUS: ACTIVE_MONITORING | SYS_TIME: 00:00:00</span>
    </nav>

    <div class="container">
        <div class="panel">
            <div class="panel-title">
                Live Network Telemetry
            </div>
            
            <div class="controls">
                <button class="filter-btn active" onclick="applyFilter('ALL')">ALL ASSETS</button>
                <button class="filter-btn" onclick="applyFilter('STAGNANT')">CRITICAL STAGNANT (DEAD STOCK)</button>
                <button class="filter-btn" onclick="applyFilter('STOCKOUT')">STOCKOUT RISK</button>
                <button class="sim-btn" onclick="simulateMarket()">[+] ADVANCE MARKET 1 DAY</button>
            </div>

            <div class="table-wrapper">
                <table id="telemetryTable">
                    <thead>
                        <tr>
                            <th>SKU ID</th>
                            <th>Node Location</th>
                            <th>Stock</th>
                            <th>Demand/Day</th>
                            <th>Stagnant Days</th>
                            <th>State</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        </tbody>
                </table>
            </div>
        </div>

        <div class="right-column">
            <div class="panel" style="flex: 0 0 auto;">
                <h2 class="panel-title">Optimization Targeting</h2>
                
                <div class="asset-card" id="selectedAssetDetails">
                    <div style="color: var(--lavender-dark);">Awaiting target selection from telemetry...</div>
                </div>

                <button class="action-btn" id="optimizeBtn" disabled onclick="runNetworkOptimization()">Run Network Optimization</button>
            </div>

            <div class="panel" style="flex-grow: 1;">
                <h2 class="panel-title">Engine Execution Log</h2>
                <div class="console" id="outputConsole">
                    <div style="color: var(--lavender-dark);">> System idle.</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Constants
        const ANNUAL_HOLDING_COST_PCT = 0.20;
        const PROFIT_MARGIN_PCT = 0.30;
        const BASE_FREIGHT_COST = 50.0;
        const RATE_PER_MILE = 0.15;
        const HANDLING_FEE = 20.0;
        const ORIGIN_SAFETY_STOCK_BUFFER = 10;

        // Decoupled Distance Matrix (Mock mapping)
        const distanceMatrix = {
            'Node-North': { 'Node-South': 1126, 'Node-East': 680, 'Node-West': 500, 'Node-Central': 271 },
            'Node-South': { 'Node-North': 1126, 'Node-East': 165, 'Node-West': 231, 'Node-Central': 826 },
            'Node-East': { 'Node-North': 680, 'Node-South': 165, 'Node-West': 1241, 'Node-Central': 157 },
            'Node-West': { 'Node-North': 500, 'Node-South': 231, 'Node-East': 1241, 'Node-Central': 214 },
            'Node-Central': { 'Node-North': 271, 'Node-South': 826, 'Node-East': 157, 'Node-West': 214 }
        };

        // Decoupled Inventory State
        let inventoryState = [
            { sku: 'ITEM-1001', node: 'Node-North', cost: 150.00, stock: 210, demand: 0, stagnant: 120, leadTime: 7 },
            { sku: 'ITEM-1001', node: 'Node-South', cost: 150.00, stock: 2, demand: 15, stagnant: 0, leadTime: 7 },
            { sku: 'ITEM-1001', node: 'Node-East', cost: 150.00, stock: 4, demand: 10, stagnant: 0, leadTime: 7 },
            { sku: 'ITEM-9954', node: 'Node-West', cost: 350.00, stock: 150, demand: 0, stagnant: 95, leadTime: 14 },
            { sku: 'ITEM-9954', node: 'Node-Central', cost: 350.00, stock: 5, demand: 12, stagnant: 0, leadTime: 14 },
            { sku: 'ITEM-4331', node: 'Node-South', cost: 65.00, stock: 300, demand: 0, stagnant: 150, leadTime: 10 },
            { sku: 'ITEM-4331', node: 'Node-North', cost: 65.00, stock: 1, demand: 20, stagnant: 0, leadTime: 10 }
        ];

        let currentFilter = 'ALL';
        let targetAsset = null;

        function updateClock() {
            const now = new Date();
            document.getElementById('sysClock').innerText = `STATUS: ACTIVE_MONITORING | SYS_TIME: ${now.toLocaleTimeString('en-US', { hour12: false })}`;
        }
        setInterval(updateClock, 1000);

        function applyFilter(filterType) {
            currentFilter = filterType;
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            renderTable();
        }

        function renderTable() {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';

            inventoryState.forEach((item, index) => {
                let isStagnant = item.stagnant >= 90;
                let reorderPoint = (item.demand * item.leadTime) * 1.2;
                let isStockout = item.stock <= reorderPoint && item.demand > 0;

                // Apply Filters
                if (currentFilter === 'STAGNANT' && !isStagnant) return;
                if (currentFilter === 'STOCKOUT' && !isStockout) return;

                let stateLabel = '<span style="color: #888;">NORMAL</span>';
                let rowClass = '';

                if (isStagnant) {
                    stateLabel = '<span class="critical-stagnant">DEAD STOCK</span>';
                } else if (isStockout) {
                    stateLabel = '<span class="critical-stockout">STOCKOUT RISK</span>';
                }

                const tr = document.createElement('tr');
                tr.onclick = () => selectTarget(index);
                
                tr.innerHTML = `
                    <td style="color: var(--teal); font-weight: bold;">${item.sku}</td>
                    <td>${item.node}</td>
                    <td>${item.stock}</td>
                    <td>${item.demand}</td>
                    <td class="${isStagnant ? 'critical-stagnant' : ''}">${item.stagnant}</td>
                    <td>${stateLabel}</td>
                `;
                tbody.appendChild(tr);
            });
        }

        function simulateMarket() {
            // Randomize daily fluctuations to create continuous test cases
            inventoryState.forEach(item => {
                if (item.demand > 0) {
                    // Simulate daily sales
                    let sales = Math.floor(item.demand * (0.8 + Math.random() * 0.4)); // +/- 20%
                    item.stock = Math.max(0, item.stock - sales);
                    // Demand fluctuates slightly
                    item.demand = Math.max(1, item.demand + Math.floor((Math.random() - 0.5) * 4));
                } else {
                    // Dead stock gets older
                    item.stagnant += 1;
                    // Rare chance a dead stock item suddenly gets demand again
                    if (Math.random() < 0.05) {
                        item.demand = Math.floor(Math.random() * 5) + 1;
                        item.stagnant = 0;
                    }
                }
            });
            renderTable();
            
            const consoleDiv = document.getElementById('outputConsole');
            consoleDiv.innerHTML = `<div style="color: var(--neon-green);">> Market advanced 1 day. Inventory levels shifted.</div>` + consoleDiv.innerHTML;
        }

        function selectTarget(index) {
            targetAsset = inventoryState[index];
            const detailsDiv = document.getElementById('selectedAssetDetails');
            
            if (targetAsset.stagnant < 90) {
                detailsDiv.innerHTML = `<div style="color: var(--warning);">Target ${targetAsset.sku} at ${targetAsset.node} is not classified as critical dead stock. Optimization disabled.</div>`;
                document.getElementById('optimizeBtn').disabled = true;
                return;
            }

            detailsDiv.innerHTML = `
                <div style="color: var(--electric-blue); margin-bottom: 10px; text-transform: uppercase;">Target Acquired: Origin Node</div>
                <div><span style="color: var(--lavender);">SKU:</span> <span style="color: var(--text-main);">${targetAsset.sku}</span></div>
                <div><span style="color: var(--lavender);">Location:</span> <span style="color: var(--text-main);">${targetAsset.node}</span></div>
                <div><span style="color: var(--lavender);">On-Hand:</span> <span style="color: var(--text-main);">${targetAsset.stock} Units</span></div>
                <div><span style="color: var(--lavender);">Stagnation:</span> <span class="critical-stagnant">${targetAsset.stagnant} Days</span></div>
            `;
            document.getElementById('optimizeBtn').disabled = false;
        }

       async function runNetworkOptimization() {
    if (!targetAsset) return;

    const consoleDiv = document.getElementById('outputConsole');
    consoleDiv.innerHTML = `<div style="color: var(--electric-blue);">> Contacting Cloud API for ${targetAsset.sku}...</div>`;
    document.getElementById('optimizeBtn').disabled = true;

    // Build the query parameters
    const params = new URLSearchParams({
        sku: targetAsset.sku,
        origin: targetAsset.node,
        cost: targetAsset.cost,
        stock: targetAsset.stock,
        stagnant: targetAsset.stagnant
    });

    try {
        // Ping your Render API
        const response = await fetch('https://cloud-chain-capstone.onrender.com/api/optimize?${params}');
        const data = await response.json();

        let html = `<div>> Network scan complete. Analyzing matrix...</div>`;

        if (data.success) {
            const winner = data.winner;
            html += `
                <div class="route-winner">
                    <div style="color: var(--neon-green); font-weight: bold; font-size: 1.1rem; margin-bottom: 5px;">[DECISION] OPTIMAL ROUTE AUTHORIZED</div>
                    <div>Execute Transfer: <span style="color: white;">${winner.transferQuantity} units</span> to <span style="color: white;">${winner.destinationNode}</span></div>
                    <div>Total Network Savings: <span style="color: white; font-weight: bold;">+$${winner.netSavings.toFixed(2)}</span></div>
                </div>
            `;
            
            // Deduct inventory locally on the UI to show the action completed
            targetAsset.stock -= winner.transferQuantity;
            renderTable();
        } else {
            html += `<div style="color: var(--danger); margin-top: 15px;">> [RESULT] Optimization Failed. No profitable routes discovered across the network. Hold asset.</div>`;
        }

        consoleDiv.innerHTML += html;
    } catch (error) {
        consoleDiv.innerHTML += `<div style="color: var(--danger);">> API Connection Error. Ensure Render service is awake.</div>`;
    }
    
    document.getElementById('optimizeBtn').disabled = false;
}

                    html += `<div style="color: var(--danger); margin-top: 15px;">> [RESULT] Optimization Failed. No profitable routes discovered across the network. Hold asset.</div>`;
                } else {
                    // Rank the routes
                    viableRoutes.sort((a, b) => b.savings - a.savings);
                    const winner = viableRoutes[0];
                    
                    html += `
                        <div class="route-winner">
                            <div style="color: var(--neon-green); font-weight: bold; font-size: 1.1rem; margin-bottom: 5px;">[DECISION] OPTIMAL ROUTE AUTHORIZED</div>
                            <div>Execute Transfer: <span style="color: white;">${winner.qty} units</span> to <span style="color: white;">${winner.node}</span></div>
                            <div>Total Network Savings: <span style="color: white; font-weight: bold;">+$${winner.savings.toFixed(2)}</span></div>
                        </div>
                    `;

                    // Immediately deduct from UI to show action was taken
                    targetAsset.stock -= winner.qty;
                    let receivingNode = inventoryState.find(n => n.node === winner.node && n.sku === targetAsset.sku);
                    if (receivingNode) receivingNode.stock += winner.qty;
                    renderTable();
                }

                consoleDiv.innerHTML += html;
                document.getElementById('optimizeBtn').disabled = false;
                
            }, 600); // Aesthetic processing delay
        }

        // Initialize
        window.onload = () => {
            renderTable();
            updateClock();
        };
    </script>
</body>
</html>
