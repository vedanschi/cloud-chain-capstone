<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Lateral Transshipment | Optimizer Platform</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #0b0714;
            --panel-bg: #18112b;
            --lavender: #a28dec;
            --lavender-dark: #3a2a6b;
            --teal: #00f0ff;
            --neon-green: #00fa9a;
            --electric-blue: #0078ff;
            --text-main: #f0f0f0;
            --danger: #ff3366;
            --warning: #ffaa00;
        }

        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-deep); }
        ::-webkit-scrollbar-thumb { background: var(--lavender-dark); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--lavender); }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-deep);
            color: var(--text-main);
            font-family: 'Rajdhani', sans-serif;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        nav {
            background: linear-gradient(90deg, var(--panel-bg) 0%, var(--lavender-dark) 100%);
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--teal);
            box-shadow: 0 4px 15px rgba(0, 240, 255, 0.1);
            flex-shrink: 0;
        }

        nav h1 { margin: 0; font-size: 1.5rem; letter-spacing: 2px; text-transform: uppercase; }
        nav span { font-family: 'JetBrains Mono', monospace; color: var(--teal); font-size: 0.9rem; }

        .dashboard-grid {
            display: grid;
            grid-template-columns: 1.4fr 1fr;
            grid-template-rows: 1fr 250px;
            gap: 20px;
            padding: 20px 40px;
            flex-grow: 1;
            overflow: hidden;
            max-width: 1800px;
            margin: 0 auto;
            width: calc(100% - 80px);
        }

        .panel {
            background-color: var(--panel-bg);
            border: 1px solid var(--lavender-dark);
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            position: relative;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .panel::before {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 3px; background: var(--electric-blue);
        }

        .panel-title {
            font-size: 1.4rem; color: var(--lavender); margin-top: 0; margin-bottom: 15px; text-transform: uppercase;
            letter-spacing: 1.5px; border-bottom: 1px solid rgba(162, 141, 236, 0.2); padding-bottom: 10px;
            display: flex; justify-content: space-between; align-items: center;
        }

        /* Forms & Controls */
        .controls { display: flex; gap: 10px; margin-bottom: 15px; align-items: center; }
        
        .form-select {
            background: rgba(0,0,0,0.5); border: 1px solid var(--lavender-dark); color: var(--teal);
            padding: 8px 12px; border-radius: 4px; font-family: 'JetBrains Mono', monospace; font-size: 0.9rem;
            outline: none; cursor: pointer; width: 100%; margin-top: 5px;
        }
        .form-select:focus { border-color: var(--electric-blue); }

        .filter-btn {
            background: transparent; border: 1px solid var(--lavender-dark); color: var(--text-main);
            padding: 6px 12px; border-radius: 4px; cursor: pointer; font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem; transition: all 0.2s;
        }
        .filter-btn:hover, .filter-btn.active { background: var(--lavender-dark); border-color: var(--lavender); }

        .action-btn {
            width: 100%; background: linear-gradient(45deg, var(--electric-blue), var(--lavender-dark));
            color: white; border: none; padding: 15px; font-family: 'Rajdhani', sans-serif; font-size: 1.2rem;
            font-weight: 700; letter-spacing: 2px; border-radius: 4px; cursor: pointer; text-transform: uppercase;
            transition: transform 0.2s, box-shadow 0.2s; margin-top: 15px;
        }
        .action-btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0, 120, 255, 0.4); background: linear-gradient(45deg, var(--teal), var(--electric-blue)); }
        .action-btn:disabled { background: var(--lavender-dark); color: rgba(255,255,255,0.3); cursor: not-allowed; transform: none; box-shadow: none; }

        /* Tables */
        .table-wrapper { flex-grow: 1; overflow-y: auto; border: 1px solid var(--lavender-dark); border-radius: 4px; background: rgba(0,0,0,0.3); }
        table { width: 100%; border-collapse: collapse; font-family: 'JetBrains Mono', monospace; font-size: 0.85rem; text-align: left; }
        th { position: sticky; top: 0; background-color: var(--lavender-dark); color: var(--text-main); padding: 12px; border-bottom: 2px solid var(--teal); z-index: 10; }
        td { padding: 12px; border-bottom: 1px solid rgba(162, 141, 236, 0.2); transition: background 0.2s; }
        tr:hover { background-color: rgba(0, 120, 255, 0.15); cursor: pointer; }

        /* Ledger & Formatting */
        .ledger-panel { grid-column: 1 / -1; } /* Spans entire bottom row */
        .hero-metric { font-size: 2rem; font-weight: bold; font-family: 'JetBrains Mono', monospace; transition: transform 0.2s; }
        
        .critical-stagnant { color: var(--danger); font-weight: bold; }
        .critical-stockout { color: var(--warning); font-weight: bold; }
        .surplus-good { color: var(--neon-green); }

        .asset-card { background: rgba(0,0,0,0.4); border: 1px dashed var(--lavender-dark); padding: 15px; border-radius: 6px; margin-bottom: 15px; font-family: 'JetBrains Mono', monospace; }

        /* Modal Subsystem */
        .modal {
            display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.85); justify-content: center; align-items: center; backdrop-filter: blur(5px);
        }
        .modal-content {
            background-color: var(--panel-bg); border: 1px solid var(--teal); padding: 30px; border-radius: 8px;
            width: 800px; max-width: 90%; box-shadow: 0 0 40px rgba(0, 240, 255, 0.2); position: relative;
        }
    </style>
</head>
<body>

    <nav>
        <h1>D.L.T. Rebalancing Engine</h1>
        <span id="sysClock">STATUS: INITIALIZING...</span>
    </nav>

    <div class="dashboard-grid">
        
        <div class="panel">
            <div class="panel-title">
                <span>Live Network Telemetry</span>
                <select id="nodeSelector" class="form-select" style="width: 250px; margin: 0;" onchange="UIController.setNodeFilter(this.value)">
                    <option value="ALL">Loading Nodes...</option>
                </select>
            </div>
            <div class="controls">
                <button class="filter-btn active" onclick="UIController.setHealthFilter('ALL', this)">ALL ASSETS</button>
                <button class="filter-btn" onclick="UIController.setHealthFilter('STAGNANT', this)">CRITICAL STAGNANT</button>
                <button class="filter-btn" onclick="UIController.setHealthFilter('STOCKOUT', this)">STOCKOUT RISK</button>
            </div>
            <div class="table-wrapper">
                <table id="telemetryTable">
                    <thead>
                        <tr>
                            <th>SKU ID</th>
                            <th>Location</th>
                            <th>Stock</th>
                            <th>Demand/Day</th>
                            <th>Stagnant Days</th>
                            <th>State</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
        </div>

        <div class="panel">
            <h2 class="panel-title">Command Center</h2>
            <div class="asset-card" id="selectedAssetDetails">
                <div style="color: var(--lavender-dark);">Awaiting target selection from telemetry...</div>
            </div>
            
            <div id="manualActionContainer" style="font-family: 'JetBrains Mono', monospace; font-size: 0.9rem;">
                </div>

            <button class="action-btn" id="optimizeBtn" disabled onclick="UIController.evaluateRoute()">Evaluate Route</button>
        </div>

        <div class="panel ledger-panel">
            <div class="panel-title">
                <span>Logistics Execution Ledger</span>
                <span class="hero-metric" id="totalSavingsCounter" style="color: var(--text-main);">$0.00</span>
            </div>
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>Timestamp</th>
                            <th>Decision Type</th>
                            <th>SKU Rebalanced</th>
                            <th>Route Executed</th>
                            <th>Net Network Savings</th>
                        </tr>
                    </thead>
                    <tbody id="ledgerBody">
                        </tbody>
                </table>
            </div>
        </div>

    </div>

    <div id="comparisonModal" class="modal">
        <div class="modal-content" id="modalContent">
            </div>
    </div>

    <script src="js/data-engine.js"></script>
    <script src="js/ui-controller.js"></script>
    <script src="js/ledger-engine.js"></script>

    <script>
        window.onload = async () => {
            console.log("Initializing DLT Engine...");
            // 1. Fetch the 250 items via Data Engine
            const dataLoaded = await DataEngine.loadInventoryData();
            
            if (dataLoaded) {
                // 2. Wake up the UI Controller and populate tables
                UIController.init();
                UIController.renderTable();
            }
        };
    </script>

</body>
</html>
